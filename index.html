<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자기소개</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Noto Sans KR", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            width: 460px;
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            color: white;
            margin: 0 auto 12px auto;
        }

        h1 {
            margin: 8px 0 4px 0;
            color: #333;
        }

        h3 {
            margin: 0;
            color: #666;
            font-weight: normal;
            font-size: 15px;
            line-height: 1.6;
        }

        .section {
            margin-top: 18px;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #4a4ae3;
            margin-bottom: 6px;
        }

        p {
            margin: 6px 0;
            color: #444;
            font-size: 15px;
        }

        ul {
            margin: 6px 0 0 18px;
            padding: 0;
            color: #444;
            font-size: 15px;
        }

        .highlight {
            margin-top: 22px;
            padding: 14px;
            background: #f3f4ff;
            border-radius: 10px;
            text-align: center;
            color: #4a4ae3;
            font-weight: bold;
        }

        .footer {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="profile">👩‍🦱</div>
            <h1>홍길동</h1>
            <h3>
                동양미래대학교 컴퓨터소프트웨어공학과<br>
		        분반 : Y3<br>
                학번 : 20269999
            </h3>
        </div>

        <div class="section">
            <div class="section-title">🎮 취미</div>
            <ul>
                <li>컴퓨터 게임하기</li>
                <li>달리기</li>
            </ul>
        </div>

        <div class="section">
            <div class="section-title">💻 관심 분야</div>
            <ul>
                <li>웹 개발(back-end)</li>
                <li>게임 개발</li>
            </ul>
        </div>

        <div class="highlight">
            훌륭한 개발자로 성장하는 것이 목표입니다🎉
        </div>

        <div class="footer">
            자기소개 실습
        </div>
    </div>
</body>
</html>
