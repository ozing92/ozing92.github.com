<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게임 사기 신고 게시판</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
      color: #222;
      padding: 2rem 1rem;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .form-box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .form-col {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 140px;
    }

    label {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }

    input[type="text"] {
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #aaa;
    }

    .form-footer {
      display: flex;
      justify-content: flex-end;
    }

    button.submit-btn {
      padding: 8px 20px;
      font-size: 14px;
      border: 1px solid #aaa;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    button.submit-btn::after {
      content: '잠깐, 확인하셨나요?';
      position: absolute;
      top: 0;
      left: -300%;
      width: 100%;
      height: 100%;
      background: #fff;
      color: #A32D2D;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: left 0.5s ease;
      white-space: nowrap;
      border-radius: 8px;
    }

    button.submit-btn:hover::after {
      left: 0;
      transition-delay: 1.5s;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-info {
      flex: 1;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      background: #FCEBEB;
      color: #A32D2D;
      border-radius: 4px;
      padding: 2px 7px;
      margin-bottom: 6px;
    }

    .game-id {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .comment {
      font-size: 13px;
      color: #555;
    }

    .date {
      font-size: 12px;
      color: #aaa;
      margin-top: 6px;
    }

    .like-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 14px;
      color: #888;
      font-size: 13px;
      min-width: 56px;
    }

    .like-icon {
      font-size: 18px;
    }

    .like-count {
      font-size: 14px;
      font-weight: 500;
    }

    .empty {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>⚠️ 게임 사기 신고 게시판</h1>
    <p class="sub">사기를 친 게임 아이디를 제보해 주세요.</p>

    <div class="form-box">
      <div class="form-row">
        <div class="form-col">
          <label>게임 아이디</label>
          <input type="text" placeholder="예: scammer123" />
        </div>
        <div class="form-col" style="flex: 2;">
          <label>한줄 코멘트</label>
          <input type="text" placeholder="예: 거래 후 잠수탔어요" />
        </div>
      </div>
      <div class="form-footer">
        <button class="submit-btn">신고 등록</button>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-info">
          <span class="badge">신고됨</span>
          <div class="game-id">👤 darkblade99</div>
          <div class="comment">아이템 받고 바로 차단함</div>
          <div class="date">2026.06.14</div>
        </div>
        <div class="like-btn">
          <span class="like-icon">♥</span>
          <span class="like-count">12</span>
        </div>
      </div>

      <div class="card">
        <div class="card-info">
          <span class="badge">신고됨</span>
          <div class="game-id">👤 night_wolf77</div>
          <div class="comment">거래 직전에 가격 올리고 잠수</div>
          <div class="date">2026.06.13</div>
        </div>
        <div class="like-btn">
          <span class="like-icon">♥</span>
          <span class="like-count">7</span>
        </div>
      </div>

      <div class="card">
        <div class="card-info">
          <span class="badge">신고됨</span>
          <div class="game-id">👤 trade_king01</div>
          <div class="comment">계정 판매 후 되찾아감</div>
          <div class="date">2026.06.12</div>
        </div>
        <div class="like-btn">
          <span class="like-icon">♥</span>
          <span class="like-count">5</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
